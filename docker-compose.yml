name: dracarys2
services:
  web:
    build:
      context: ./
    volumes:
      - .:/src
      - /src/node_modules
    command: npm start
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./.env
    networks:
      - dracarys-net

  db:
    image: mysql:8.0
    restart: always
    command: --default-authentication-plugin=mysql_native_password
    env_file:
      - ./.env
    ports:
      - "3309:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./Database.sql:/docker-entrypoint-initdb.d/Database.sql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dracarys-net

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    restart: always
    env_file:
      - ./.env
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "8085:80"
    depends_on:
      - db
    networks:
      - dracarys-net

volumes:
  db_data:

networks:
  dracarys-net:
    driver: bridge
