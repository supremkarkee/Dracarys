services:
  web:
    container_name: dracarys_web
    build:
      context: ./
    volumes:
      - .:/src
      - /src/node_modules
    command: npm start
    ports:
      - "3000:3000"
    restart: always
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./.env

  db:
    container_name: dracarys_db
    image: mysql:8.0
    restart: always
    env_file:
      - ./.env
    ports:
      - "13306:3306"
    volumes:
      - ./db:/var/lib/mysql
      - ./Database.sql:/docker-entrypoint-initdb.d/Database.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  phpmyadmin:
    container_name: dracarys_phpmyadmin
    image: phpmyadmin/phpmyadmin:latest
    platform: linux/amd64
    restart: always
    depends_on:
      - db
    env_file:
      - ./.env
    environment:
      PMA_HOST: db
    ports:
      - "8081:80"
